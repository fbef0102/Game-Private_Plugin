		"11"
		{
			"weight"		"50"
	
			"hp_min"		"50"		
			"hp_max"		"50"
			"speed_min"		"150"		
			"speed_max"		"200"
			"damage_mult"	"-1"
			"armor_mult"	"-1"
			
			//82=蹲下跑

//Common infected default running speed: 250
//Common infected default hp: 250
//If set infected HP: 50
// => Jimmy Gibbs Junior HP: 50 * 60 = 3000
// => Fallen Survivor HP: 50 * 20 (sv_fallen_survivor_health_multiplier) = 1000
// => Road Crew infected HP: 50 * 3 = 150
// => CEDA Worker Infected HP: 50 * 3 = 150
// => Clown Infected HP: 50 * 3 = 150
// => Mud Men HP: 50 * 3 = 150
// => Riot Infected HP: 50 = 50
//
// How to see all infected model sequence ID?
// (L4D2)Check data/l4d2_common_declare_sequence.cfg
// (L4D1)Check data/l4d1_common_declare_sequence.cfg
// 1. Download "Left 4 Dead 2 Authoring Tools" from steam game library
// 2. Launch -> open "Model Viewer"
// 3. (Above) File -> Load Model -> load infected model, path: ROOT\models\infected\common_xxxx.mdl
// 4. (Above) View -> Check "Show sequence numbers"
// 5. (Below) Sequence -> You can see all sequnce ID
//-
//普通殭屍的預設跑步速度: 250
//普通殭屍的預設血量: 50
//如果殭屍血量改成: 50
// => 吉米賽車手的血量: 50 * 60 = 3000
// => 墮落倖存者的血量: 50 * 20 (sv_fallen_survivor_health_multiplier) = 1000
// => 工人的血量: 50 * 3 = 150
// => CEDA防疫人員的血量: 50 * 3 = 150
// => 小丑的血量: 50 * 3 = 150
// => 泥人的血量: 50 * 3 = 150
// => 暴鎮警察的血量: 50 = 50
//
// 如何查看感染者模型可以用的 sequence 動畫ID?
// (二代)查看文件 data/l4d2_common_declare_sequence.cfg
// (一代)查看文件 data/l4d1_common_declare_sequence.cfg
// 1. Steam遊戲庫下載 "Left 4 Dead 2 Authoring Tools" 
// 2. 啟動 -> 打開 "Model Viewer"
// 3. (上方工具列) File -> Load Model -> 隨便選擇一個感染者模型, 路徑是: ROOT\models\infected\common_xxxx.mdl
// 4. (上方工具列) View -> 打勾 "Show sequence numbers" 
// 5. (下方工具列) Sequence -> 你可以看到所有 sequnce ID

"l4d2_common_infected_control"
{
	// Game is left 4 dead 2
	// 遊戲是二代
	"Left4Dead2"
	{
		// 一個殭屍被改造血量、速度、傷害、跑步動畫的機率 (0=不修改)
		// Chance that the common infected will be turned (Change HP, Speed, Damage and running animation). [0-100]%
		"chance"	"90"
		
		// 1=泥人感染者不修改跑步的動畫姿勢 (預設是蹲下跑的姿勢), 0=修改
		// 1=Don't modify Mud men infected running animation, 0=Modify
		"MUD_disable_sequence"	"1"
		
		// 可以改造成幾種感染者? (隨機挑選)
		// How many infected type we can change (Randomly choose)
		"num"	"11"
		
		// 設置第一種感染者
		// Set Infected type 1
		"1"
		{
			//權重分配, 填1~100 (數值越大, 越容易被選中)
			//The weight for Type 1 common spawning
			"weight"	"50"
		
			//設置血量(最小) (-1=不變)	
			//Set HP (Min) (-1=Unchanged)
			"hp_min"	"20"

			//設置血量(最大) (-1=不變)		
			//Set HP (Max) (-1=Unchanged)
			"hp_max"	"40"
		
			//設置速度(最小) (-1=不變)
			//Set Speed (Min) (-1=Unchanged)
			"speed_min"	"375"

			//設置速度(最大) (-1=不變)		
			//Set Speed (Max) (-1=Unchanged)
			"speed_max"	"450"
			
			//Multiplier for damage done to the Survivors (-1=Unchanged)
			//對倖存者造成傷害的倍率 (-1=不變)
			//數值越高, 傷害越大
			"damage_mult"	"1.5"
			
			//Multiplier for damage done by the Survivors (-1=Unchanged)
			//受到傷害的倍率 (-1=不變)
			//數值越低, 傷害越低
			"armor_mult"	"-1"
			
			// Change running animation
			// Please write sequence ID (-1=Unchanged)
			// -
			// 改變跑步的姿勢
			// 請填入sequence 動畫ID (-1=不改變)
			"sequence"	"-1"
		}
		// 設置第二種感染者
		// Set Infected type 2
		"2"
		{
			"weight"		"50"

			"hp_min"		"65"		
			"hp_max"		"85"
			"speed_min"		"300"		
			"speed_max"		"400"
			"damage_mult"	"0.8"
			"armor_mult"	"-1"
			
			//92=著火跑步
			"sequence"		"92"
		}
		"3"
		{
			"weight"		"50"
	
			"hp_min"		"30"		
			"hp_max"		"60"
			"speed_min"		"275"		
			"speed_max"		"375"
			"damage_mult"	"1.2"
			"armor_mult"	"-1"
			
			//142=跳躍姿勢
			"sequence"		"142"
		}
		"4"
		{
			"weight"		"50"

			"hp_min"		"80"		
			"hp_max"		"110"
			"speed_min"		"100"		
			"speed_max"		"175"
			"damage_mult"	"0.6"
			"armor_mult"	"-1"
			
			//132=被推到往前
			"sequence"		"132"
		}
		
		"5"
		{
			"weight"		"50"

			"hp_min"		"20"		
			"hp_max"		"40"
			"speed_min"		"40"		
			"speed_max"		"60"
			"damage_mult"	"-1"
			"armor_mult"	"-1"
			
			// 70=慢步
			"sequence"	"70"
		}
		"6"
		{
			"weight"		"50"
	
			"hp_min"		"50"		
			"hp_max"		"50"
			"speed_min"		"40"		
			"speed_max"		"60"
			"damage_mult"	"-1"
			"armor_mult"	"-1"
			
			//70=慢走
			"sequence"	"70"
		}
		"7"
		{
			"weight"		"50"
	
			"hp_min"		"50"		
			"hp_max"		"50"
			"speed_min"		"150"		
			"speed_max"		"200"
			"damage_mult"	"-1"
			"armor_mult"	"-1"
			
			//79=很快走
			"sequence"	"79"
		}
		"8"
		{
			"weight"		"50"
	
			"hp_min"		"50"		
			"hp_max"		"50"
			"speed_min"		"150"		
			"speed_max"		"200"
			"damage_mult"	"-1"
			"armor_mult"	"-1"
			
			//80=走路

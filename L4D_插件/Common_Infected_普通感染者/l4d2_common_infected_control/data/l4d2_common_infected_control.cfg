			"damage_mult"	"-1"
			"armor_mult"	"-1"
			
			//1533=爬行姿勢
			"sequence"		"153"
		}			
		"10"
		{
			"weight"		"50"
	
			"hp_min"		"50"		
			"hp_max"		"50"
			"speed_min"		"150"		
			"speed_max"		"200"
			"damage_mult"	"-1"
			"armor_mult"	"-1"
			
			//81=蹲下跑
			"sequence"		"81"

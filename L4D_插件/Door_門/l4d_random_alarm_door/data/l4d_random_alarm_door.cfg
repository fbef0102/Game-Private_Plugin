//Ideas from back 4 Blood
//學Back 4 Blood

"l4d_random_alarm_door"
{
	"Doors"
	{
		// Models listed here will not be turned into alarm doors
		// Avoid conflicts with custom maps
		// --
		// 寫在這裡的模型將不會變成警報門
		// 避免與三方圖發生衝突
		"model_excluded"
		{
			"1" "model/props/gun_store_door.mdl"
			"2" "models/props_doors/checkpoint_door_02.mdl"
			"3" "models/props_doors/checkpoint_door_-02.mdl"
			"4"	"models/lighthouse/checkpoint_door_lighthouse02.mdl"
			"5"	"models/props_doors/checkpoint_door_01.mdl"
			"6"	"models/props_doors/checkpoint_door_-01.mdl"
			"7" "models/lighthouse/checkpoint_door_lighthouse01.mdl"
		}
	}

	"Maps"
	{
		// If cvar not set in "xxx" (map name) selection, the plugin will use "default" (Global) selection
		// 如果在 "xxx" (地圖名) 區段沒有找到參數, 則會使用 "default" 區段預設的參數

		// Global settings for all maps
		// 所有地圖預設參數
		"default"
		{
			// 1=Enable plugin in this map, 0=Disable plugin in this map
			// 1=起用插件, 0=關閉插件
			"enable" "1"
			
			// Change to turn a door into the alarm door: [0-100]%
			// 將一扇門變成警報門的機率: [0-100]%
			"chance"	"50"
			
			// 1=The door can be alarm door if default state is open, 0=Off
			// 1=預設是開著的門可以變成警報門, 0=不可以
			"door_open"		"1"
			
			// 1=The door can be alarm door if default state is closed, 0=Off
			// 1=預設是關著的門可以變成警報門, 0=不可以
			"door_closed"	"1"

			// If 1, Ignore door which has default targetname (Don't modify this if you don't know what targetname is)
			// The important doors always have targetname on custom maps
			// -
			// 為1時，門如果預設有targetname，則不會變成警報門 (不知道targetname是捨就不要修改此數值)
			// 很多三方圖的關鍵門經常有targetname
			"door_targetname_ignore"	"1"

			// Set the alarm door color (RGB)
			// Three values between 0-255 separated by spaces. RGB Color255 - Red Green Blue. (Empty=No color set)
			// -
			// 設置警報門的顏色
			// 填入RGB三色，三個數值介於0~255，需要空格 (空白: 不設置顏色)
			"alarm_door_color"	"155 0 0"

			// (L4D2) If 1, Enable alarm door glow
			// (L4D2) 為1時，警報門會發光
			"alarm_glow_enable"	"1"

			// (L4D2) Alarm door glow range (0=Unlimited range)
			// (L4D2) 警報門光圈可見範圍 (0=無限範圍)
			"alarm_glow_range"	"180"

			// (L4D2) If 1, Enable director instructor hint if someone trigger the alarm door
			// (L4D2) 為1時，有人觸發警報門會有導演提示
			"alarm_instructorhint_enable"	"1"

			// (L4D2) Instructor icon name on the alarm door. (For more icons: https://developer.valvesoftware.com/wiki/Env_instructor_hint)
			// (L4D2) 導演提示的圖案 (查找更多圖案: https://developer.valvesoftware.com/wiki/Env_instructor_hint)
			"alarm_instructorhint_icon"	"icon_alert_red"

			// (L4D2) Instructor hint color (RGB)
			// Three values between 0-255 separated by spaces. RGB Color255 - Red Green Blue. (Empty=No color set)
			// -
			// (L4D2) 導演提示的文字顏色
			// 填入RGB三色，三個數值介於0~255，需要空格 (空白: 不設置顏色)
			"alarm_instructorhint_color"	"255 0 0"

			// (L4D2) Instructor hint display range (0=Unlimited range)
			// (L4D2) 導演提示的可見範圍 (0=無限範圍)
			"alarm_instructorhint_range"	"500.0"

			// (L4D2) Instructor hint display time.
			// (L4D2) 導演提示的顯示時間
			"alarm_instructorhint_time"	"10.0"

			// The alarm sound play time
			// 警報聲的持續時間
			"alarm_sound_time"	"25.0"

			// If 1, If the door is damaged by other entity (for exmaple: common infected or special infected), the alarm door will be normal door
			// 為1時，當警報門被損壞時 (譬如: 殭屍/特感抓門)，將會失去警報作用
			"alarm_damage_break"	"0"

			// 1=AI Bots trigger the alarm door, 0=AI Bots won't trigger the alarm door
			// 1=AI Bots 會觸發警報門, 0=AI Bots 不會觸發警報門
			"alarm_ai_bots"			"0"

			// How message displays. (0: Disable, 1:In chat, 2: In Hint Box, 3: In center text)
			// 提示該如何顯示. (0: 不提示, 1: 聊天框, 2: 黑底白字框, 3: 螢幕正中間)
			"announce_type"			"1"
		}
	
		// map name 
		// 地圖名稱
		"c8m4_interior"
		{
			//"enable"	"0"
			"door_targetname_ignore"	"0"
		}

		"c11m2_offices"
		{
			"door_targetname_ignore"	"0"
		}
	}
}

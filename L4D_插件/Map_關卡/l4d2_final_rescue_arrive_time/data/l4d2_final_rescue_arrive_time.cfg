// If cvar not set in "xxx" (map name) selection, the plugin will use "default" (Global) selection
// 如果參數沒有在 "xxx" (地圖名稱) 區段找到, 則會使用 "default" 區段內預設的參數

"l4d2_final_rescue_arrive_time"
{
	// Game is left 4 dead 2
	// 遊戲是 left 4 dead 2
	"Left4Dead2"
	{
		// Global settings for all maps
		// 所有地圖預設配置
		"default"
		{
			// Set rescue vehicle arrive time. (seconds) (0=Off)
			// Auto disable plugin in the following final type.
			// 1. Gauntlet final, e.g., c5m5, c13m4
			// 2. Scavenge final, e.g., c1m4, c6m3
			// -
			// 救援載具抵達時間 (0=關閉)
			// 當遇到以下救援類型則自動關閉插件
			// 1. 衝刺跑圖, 譬如: c5m5, c13m4
			// 2. 灌汽油載具, 譬如: c1m4, c6m3
			"time"		"600" 
			
			// How message displays. (0: Disable, 1:In chat, 2: In Hint Box, 3: In center text)
			// 倒數提示該如何顯示. (0: 不提示, 1: 聊天框, 2: 黑底白字框, 3: 螢幕正中間)
			"announce_type" "2" 
			
			// (L4D2) When to countdown timer, 0=Once Final Starts, 1=First Tank Stage, 2=Second Tank Stage
			// (L4D2) 何時開始倒數計時, 0=救援開始時, 1=第一波Tank階段時, 2=第二波Tank階段時
			"start"		"0"
			
			// Display countdown hint text when remaining time is below this value
			// 剩餘此秒數以下時，開始顯示倒數
			"announce_left"	"90"
			
			// If 1, countdown timer pause when tank is on the field
			// 為1時，Tank在場上時，倒數時間暫停
			"tank_pause"	"0"
		}
		
		// Map name
		// 地圖名
		"c1m4_atrium"
		{
			// 因為此地圖是灌汽油通關，所以自動關閉插件
			// Because this final is scavenge, so auto disable plugin
			"time"		"0" 
		}
		"c2m5_concert"
		{
			"time"      "600"

			"start"		"0"
		}
		"c3m4_plantation"
		{
			"time"		"600"
			"start"		"0"
		}
		"c4m5_milltown_escape"
		{
			"time"		"600"
			"start"		"0"
		}
		"c5m5_bridge"
		{
			// 因為此地圖是衝刺跑圖上直升機，所以自動關閉插件
			// Because this final is Gauntlet, so auto disable plugin
			"time"		"0"
		}
		"c6m3_port"
		{
			"time"		"600"
		}
		"c7m3_port"
		{
			"time"		"200"
			"start"		"3"
		} 
		"c8m5_rooftop"
		{
			"time"		"600"
			"start"		"0"
		}
		"c9m2_lots"
		{
			"time"		"600"
			"start"		"0"
		}
		"c10m5_houseboat"
		{
			"time"		"600"
			"start"		"0"
		}
		"c11m5_runway"
		{
			"time"		"600"
			"start"		"0"
		}
		"c12m5_cornfield"
		{
			"time"		"600"
			"start"		"0"
		}
		"c13m4_cutthroatcreek"
		{
			// 因為此地圖是衝刺跑圖上直升機，所以自動關閉插件
			// Gauntlet Final, so auto disable plugin
			"time"		"0"
		}
		"c14m2_lighthouse"
		{
			"time"		"600"
			"start"		"1"
		}
	}
	// Game is left 4 dead 1
	// 遊戲是 left 4 dead 1
	"Left4Dead1"
	{
		// Global settings for all maps
		// 所有地圖預設配置
		"default"
		{
			// Set rescue vehicle arrive time. (seconds) (0=Off)
			// Auto disable plugin in the following final type.
			// 1. Gauntlet final, e.g., c5m5, c13m4
			// 2. Scavenge final, e.g., c1m4, c6m3
			// -
			// 救援載具抵達時間 (0=關閉)
			// 當遇到以下救援類型則自動關閉插件
			// 1. 衝刺跑圖, 譬如: c5m5, c13m4
			// 2. 灌汽油載具, 譬如: c1m4, c6m3
			"time"		"600" 
			
			// How message displays. (0: Disable, 1:In chat, 2: In Hint Box, 3: In center text)
			// 倒數提示該如何顯示. (0: 不提示, 1: 聊天框, 2: 黑底白字框, 3: 螢幕正中間)
			"announce_type" "2" 
			
			// (L4D1) If is regular final, when to countdown timer
			// 1=First Final Stage (Horde Wave, Once Final Starts)
			// 2=Second Final Stage (Horde Wave)
			// 3=3rd Final Stage (First Tank Wave)
			// 4=4th Final Stage (Horde Wave)
			// 5=5th Final Stage (Horde Wave)
			// 6=6th Final Stage (Second Tank Wave)
			// 7=7th Final Stage (After Second Tank Wave finished)
			//-
			// (L4D1) 救援關卡, 何時開始倒數計時
			// 1=第一個救援階段時 (屍潮波, 也就是救援開始時)
			// 2=第二個救援階段時 (屍潮波)
			// 3=第三個救援階段時 (第一波Tank局)
			// 4=第四個救援階段時 (屍潮波)
			// 5=第五個救援階段時 (屍潮波)
			// 6=第六個救援階段時 (第二波Tank局)
			// 7=第七個救援階段時 (第二波Tank局結束之後)
			"finale_start"		"1"
			
			// (L4D1) If is the special DLC3 finale, when to countdown timer (Example: The sacrifice)
			// 1=First Finale State (First generator)
			// 2=Second Finale State (Second generator)
			// 3=3rd Finale State (3rd generator)
			//-
			// (L4D1) 特殊的DLC3救援關卡, 何時開始倒數計時 (譬如: 犧牲地圖)
			// 1=第一個救援階段時 (第一個發電機啟動時)
			// 2=第二個救援階段時 (第二個發電機啟動時)
			// 3=第三個救援階段時 (第三個發電機啟動時)
			"finale_dlc3_start"		"1"
			
			// Display countdown hint text when remaining time is below this value
			// 剩餘此秒數以下時，開始顯示倒數
			"announce_left"	"90"
			
			// If 1, countdown timer pause when tank is on the field
			// 為1時，Tank在場上時，倒數時間暫停
			"tank_pause"	"0"
		}
		
		// Map name
		// 地圖名
		"l4d_hospital05_rooftop"
		{
			"time"		"300"
			"finale_start"		"1"
		}
		
		"l4d_river03_port"
		{
			"time"		"100" 
			"finale_dlc3_start"		"3"
		}
	}
}

//--Gunfire Slowdown Calculation Formula--
//1. Tank move speed=210, "pistol"=0.3
//If Tank being shot by pistol, speed: 210 - (210*0.3) = 147
//
//2. Tank duck speed=75, "pistol"=0.3, "crouch"=0.5
//If Tank being shot by pistol when crouch, speed: 75 - (75*0.3*0.5) = 63.75
//--
//--槍緩速度計算--
//1.假設Tank移動速度=210, 手槍速度衰減"pistol"=0.3
//Tank移動時被手槍打中時, 移動速度變成 210 - (210*0.3) = 147
//
//2.假設Tank蹲下速度=75, 手槍速度衰減"pistol"=0.3, 蹲下倍率"crouch"=0.5
//Tank蹲下時被手槍打中時, 移動速度變成 75 - (75*0.3*0.5) = 63.75


